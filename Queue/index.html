<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dMarch SSoT Dashboard</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --accent: #38bdf8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--card); border-radius: 12px; padding: 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        h2 { color: var(--accent); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .status { font-size: 0.8rem; margin-bottom: 20px; color: #10b981; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌐 D'marcFF SSoT</h2>
    <div id="status" class="status">Connecting to Server...</div>

    <input type="number" id="num" placeholder="Nomor Antrean (Misal: 10)">
    <input type="number" id="loket" placeholder="Nomor Loket (1-4)">
    <button onclick="sendCall()">📢 PANGGIL & SIMPAN DI SERVER</button>

    <hr style="border: 0.5px solid #334155; margin: 20px 0;">

    <input type="text" id="marquee" placeholder="Teks Jalan Baru">
    <button style="background: transparent; border: 1px solid var(--accent); color: var(--accent);" onclick="sendMarquee()">💾 SIMPAN TEKS KE SERVER</button>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
    const broker = 'wss://ddac82518d464650bbfe8e03922a3ca8.s1.eu.hivemq.cloud:8884/mqtt';
    const client = mqtt.connect(broker, {
        username: 'dmarchFF',
        password: 'dmarchFF2205'
    });

    const DEVICE_ID = "dmarch_queue_001";

    client.on('connect', () => {
        document.getElementById('status').innerText = "Server Status: ONLINE (SSoT Active)";
    });

    function sendCall() {
        const n = document.getElementById('num').value;
        const l = document.getElementById('loket').value;
        if(!n || !l) return;

        const payload = JSON.stringify({ nomor: parseInt(n), loket: parseInt(l) });
        
        // Kirim ke Call (untuk trigger audio instan)
        client.publish(`${DEVICE_ID}/call`, payload);
        
        // Kirim ke status/last_num dengan RETAIN (untuk SSoT)
        client.publish(`${DEVICE_ID}/status/last_num`, payload, { retain: true, qos: 1 });
        alert("Data antrean berhasil disinkronkan ke server!");
    }

    function sendMarquee() {
        const txt = document.getElementById('marquee').value;
        if(!txt) return;

        // Kirim dengan RETAIN agar semua device (lama/baru) ambil data ini
        client.publish(`${DEVICE_ID}/msg/update`, txt, { retain: true, qos: 1 });
        alert("Teks jalan berhasil diperbarui di seluruh perangkat!");
    }
</script>
</body>
</html>
