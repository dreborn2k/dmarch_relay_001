<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dMarch Queue - SSoT Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        /* Estetika mengacu pada dmarch_relay_001/Relay4Ch */
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card); border-radius: 20px; padding: 30px; width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: var(--primary); font-size: 24px; margin-bottom: 5px; }
        .status-bar { display: flex; justify-content: space-around; font-size: 12px; margin-bottom: 20px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .status-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b; }
        .dot.active { background: #10b981; box-shadow: 0 0 10px #10b981; }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 13px; color: #94a3b8; margin-left: 5px; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; margin-top: 5px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .btn-sync { background: transparent; border: 1px solid var(--primary); color: var(--primary); margin-top: 15px; }
        
        #log { margin-top: 20px; background: #000; border-radius: 10px; padding: 10px; font-family: monospace; font-size: 11px; color: #10b981; height: 80px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>dMarch Queue</h1>
    <p style="font-size: 12px; color: #94a3b8; margin-bottom: 20px;">Single Source of Truth Dashboard</p>

    <div class="status-bar">
        <div class="status-item"><div id="mqtt-dot" class="dot"></div> MQTT</div>
        <div class="status-item"><div id="github-dot" class="dot"></div> GitHub SSoT</div>
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="input-group" style="flex: 2;">
            <label>Nomor Antrean</label>
            <input type="number" id="num" placeholder="0">
        </div>
        <div class="input-group" style="flex: 1;">
            <label>Loket</label>
            <input type="number" id="loket" placeholder="1">
        </div>
    </div>

    <div class="input-group">
        <label>Running Text (P10)</label>
        <input type="text" id="marquee" placeholder="Teks antrean...">
    </div>

    <button onclick="panggilAntrean()">📢 PANGGIL SEKARANG</button>
    <button class="btn-sync" onclick="syncOnly()">💾 HANYA UPDATE DATA.JSON</button>

    <div id="log">Initializing system...</div>
</div>

<script>
    // --- KONFIGURASI ---
    const CONFIG = {
        mqtt: 'wss://ddac82518d464650bbfe8e03922a3ca8.s1.eu.hivemq.cloud:8884/mqtt',
        user: 'dmarchFF',
        pass: 'dmarchFF2205',
        topic: 'dmarch_queue_001',
        github: {
            token: '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',
            repo: 'dreborn2k/dmarchFF',
            path: 'Queue/Data/Data.json'
        }
    };

    const client = mqtt.connect(CONFIG.mqtt, { username: CONFIG.user, password: CONFIG.pass });

    // --- SINKRONISASI GITHUB (SSoT) ---
    async function updateGitHub(n, l, m) {
        const url = `https://api.github.com/repos/${CONFIG.github.repo}/contents/${CONFIG.github.path}`;
        try {
            const res = await fetch(url, { headers: { Authorization: `token ${CONFIG.github.token}` } });
            const fileData = await res.json();
            
            const body = JSON.stringify({
                last_number: parseInt(n),
                last_loket: parseInt(l),
                marquee_text: m,
                version: "3.1.0"
            }, null, 2);

            const putRes = await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${CONFIG.github.token}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: `Queue Sync: A${n}`,
                    content: btoa(unescape(encodeURIComponent(body))),
                    sha: fileData.sha
                })
            });

            if (putRes.ok) {
                printLog("GitHub Data.json Updated!");
                document.getElementById('github-dot').classList.add('active');
            }
        } catch (e) { printLog("GitHub Error: " + e.message); }
    }

    async function loadInitialData() {
        const url = `https://raw.githubusercontent.com/${CONFIG.github.repo}/main/${CONFIG.github.path}`;
        try {
            const res = await fetch(url + "?t=" + new Date().getTime());
            const data = await res.json();
            document.getElementById('num').value = data.last_number;
            document.getElementById('loket').value = data.last_loket;
            document.getElementById('marquee').value = data.marquee_text;
            printLog("Data SSoT loaded from GitHub");
            document.getElementById('github-dot').classList.add('active');
        } catch (e) { printLog("GitHub load failed."); }
    }

    // --- MQTT & LOGIKA ---
    client.on('connect', () => {
        printLog("Connected to HiveMQ Cloud");
        document.getElementById('mqtt-dot').classList.add('active');
        loadInitialData();
    });

    function printLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `> ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    function panggilAntrean() {
        const n = document.getElementById('num').value;
        const l = document.getElementById('loket').value;
        const m = document.getElementById('marquee').value;

        if (!n || !l) return alert("Nomor/Loket kosong!");

        const payload = JSON.stringify({ nomor: parseInt(n), loket: parseInt(l) });
        
        // 1. MQTT Real-time (Trigger Suara & Display Langsung)
        client.publish(`${CONFIG.topic}/call`, payload, { qos: 1 });
        client.publish(`${CONFIG.topic}/msg/update`, m, { retain: true });

        // 2. GitHub API (Update JSON SSoT)
        updateGitHub(n, l, m);
        printLog(`Calling A${n} to Loket ${l}...`);
    }

    function syncOnly() {
        const n = document.getElementById('num').value;
        const l = document.getElementById('loket').value;
        const m = document.getElementById('marquee').value;
        updateGitHub(n, l, m);
    }
</script>

</body>
</html>
