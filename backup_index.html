<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dMarchFF Relay Pro - Web Control</title>
  <!-- ✅ Library MQTT harus load duluan -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --accent:#38bdf8; --success:#10b981; --danger:#ef4444; --border:#334155; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 5px; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 20px; font-size: 0.9rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
    .card h3 { margin-bottom: 15px; color: var(--accent); display: flex; align-items: center; gap: 8px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #94a3b8; }
    input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.95rem; }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    input:read-only { background: #162032; color: #64748b; cursor: default; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.95rem; transition: 0.2s; }
    button:hover { opacity: 0.9; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; }
    .stat-val { font-size: 1.3rem; font-weight: bold; color: var(--accent); }
    .stat-lbl { font-size: 0.75rem; color: #94a3b8; }
    .terminal { background: #000; color: #0f0; font-family: monospace; padding: 10px; border-radius: 8px; height: 150px; overflow-y: auto; font-size: 0.8rem; white-space: pre-wrap; }
    .hidden { display: none !important; }
    #connStatus { text-align: center; margin-top: 10px; font-size: 0.85rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔌 dMarchFF Relay Pro</h1>
    <p class="subtitle">Web Control Panel - HiveMQ Cloud</p>

    <div class="card" id="connCard">
      <h3>🔗 Koneksi MQTT</h3>
      <div class="grid-2">
        <div class="form-group"><label>Device ID</label><input type="text" id="deviceId" value="dmarch_relay_001" readonly></div>
        <div class="form-group"><label>Broker</label><input type="text" id="broker" value="ddac82518d464650bbfe8e03922a3ca8.s1.eu.hivemq.cloud"></div>
        <div class="form-group"><label>Port (WSS)</label><input type="number" id="port" value="8884"></div>
        <div class="form-group"><label>Client ID</label><input type="text" id="clientId" placeholder="Auto-generated" readonly></div>
        <div class="form-group"><label>Username</label><input type="text" id="username" value="dmarchFF"></div>
        <div class="form-group"><label>Password</label><input type="password" id="password" value="dmarchFF2205"></div>
      </div>
      <button class="btn-primary" id="btnConnect">🔗 Connect</button>
      <p id="connStatus">Status: Disconnected</p>
    </div>

    <button id="disconnectBtn" class="btn-danger hidden">🔌 Disconnect MQTT</button>

    <div class="card app-card hidden"><h3>📊 System Health</h3><div class="stat-grid"><div><div class="stat-val" id="sigVal">--</div><div class="stat-lbl">Signal</div></div><div><div class="stat-val" id="upVal">--</div><div class="stat-lbl">Uptime</div></div><div><div class="stat-val" id="tempVal">--°C</div><div class="stat-lbl">Temp</div></div><div><div class="stat-val" id="fwVal">--</div><div class="stat-lbl">FW</div></div></div></div>
    
    <div class="card app-card hidden"><h3>⚡ Relay Control</h3><div class="grid-2"><button class="btn-success" id="allOnBtn">▶️ ALL ON</button><button class="btn-danger" id="allOffBtn">⏹️ ALL OFF</button></div><div class="grid-2" style="margin-top:12px;" id="relayBtns"></div></div>
    
    <div class="card app-card hidden"><h3>⚙️ Settings</h3><div class="form-group"><label>🕐 NTP Server</label><select id="ntpSelect"><option value="id.pool.ntp.org">id.pool.ntp.org</option><option value="pool.ntp.org">pool.ntp.org</option><option value="time.google.com">time.google.com</option><option value="time.cloudflare.com">time.cloudflare.com</option><option value="time.windows.com">time.windows.com</option></select></div><div class="form-group"><label>Timezone (Jam)</label><input type="number" id="tzInput" value="7"></div><button class="btn-primary" id="saveNTPBtn">💾 Save NTP & TZ</button><div class="form-group" style="margin-top:15px;"><label>🔌 GPIO Mapping</label><input type="text" id="gpioInput" placeholder="Contoh: 12,14,27,26,25"></div><button class="btn-primary" id="updateGPIOBtn">💾 Update GPIO</button></div>
    
    <div class="card app-card hidden" id="networkCard"><h3>🌐 Network Settings</h3><div class="form-group"><label>SSID WiFi Baru</label><input type="text" id="netSsid" placeholder="Masukkan SSID"></div><div class="form-group"><label>Password WiFi</label><input type="password" id="netPass" placeholder="Masukkan Password"></div><button class="btn-success" id="updateNetBtn">💾 Update Network</button><button class="btn-danger" id="resetNetBtn" style="margin-top:10px;">🔄 Reset WiFi (AP)</button></div>
    
    <div class="card app-card hidden"><h3>🔄 System</h3><div class="grid-2"><button class="btn-primary" id="otaBtn">⬇️ Check OTA</button><button class="btn-danger" id="restartBtn">🔄 Restart</button></div></div>
    
    <div class="card app-card hidden"><h3>📝 Terminal Log</h3><div class="terminal" id="terminal"></div><button class="btn-secondary" style="margin-top:10px;" id="clearLogBtn">🗑️ Clear Log</button></div>
  </div>

  <script>
    // ✅ GUNAKAN 'client' AGAR TIDAK BENTROK DENGAN LIBRARY 'mqtt'
    var client = null;
    var DEVICE_ID = "dmarch_relay_001";

    document.addEventListener('DOMContentLoaded', function() {
      // Cek library load
      if (typeof mqtt === 'undefined') {
        alert('❌ Library MQTT gagal dimuat. Periksa koneksi internet atau CDN.');
        return;
      }

      document.getElementById('clientId').value = 'web_' + Math.random().toString(16).substr(2, 8);
      document.getElementById('deviceId').value = DEVICE_ID;

      // Generate tombol relay
      var rBox = document.getElementById('relayBtns');
      for(var i=1; i<=5; i++) {
        var btn = document.createElement('button');
        btn.className = 'btn-secondary';
        btn.textContent = 'Relay ' + i;
        (function(num) {
          btn.onclick = function() { pub(DEVICE_ID + '/relay/' + num + '/cmd', '1'); };
        })(i);
        rBox.appendChild(btn);
      }

      // Attach events
      document.getElementById('btnConnect').onclick = toggleConnect;
      document.getElementById('disconnectBtn').onclick = toggleConnect;
      document.getElementById('allOnBtn').onclick = function() { pub(DEVICE_ID + '/all/on', '1'); };
      document.getElementById('allOffBtn').onclick = function() { pub(DEVICE_ID + '/all/off', '1'); };
      document.getElementById('saveNTPBtn').onclick = function() {
        pub(DEVICE_ID + '/ntp/set', document.getElementById('ntpSelect').value);
        pub(DEVICE_ID + '/timezone/set', document.getElementById('tzInput').value);
      };
      document.getElementById('updateGPIOBtn').onclick = function() { pub(DEVICE_ID + '/gpio/update', document.getElementById('gpioInput').value); };
      document.getElementById('updateNetBtn').onclick = updateNetwork;
      document.getElementById('resetNetBtn').onclick = resetWifi;
      document.getElementById('otaBtn').onclick = function() { pub(DEVICE_ID + '/system/ota', '1'); };
      document.getElementById('restartBtn').onclick = function() { pub(DEVICE_ID + '/system/restart', '1'); };
      document.getElementById('clearLogBtn').onclick = function() { document.getElementById('terminal').innerHTML = ''; };
    });

    function log(msg) {
      var term = document.getElementById('terminal');
      term.innerHTML = '[' + new Date().toLocaleTimeString() + '] ' + msg + '\n' + term.innerHTML;
    }

    function setConnectionState(connected) {
      var connCard = document.getElementById('connCard');
      var disBtn = document.getElementById('disconnectBtn');
      var appCards = document.querySelectorAll('.app-card');
      var statusEl = document.getElementById('connStatus');

      if (connected) {
        connCard.classList.add('hidden');
        disBtn.classList.remove('hidden');
        appCards.forEach(function(c) { c.classList.remove('hidden'); });
        statusEl.textContent = 'Status: Connected';
      } else {
        connCard.classList.remove('hidden');
        disBtn.classList.add('hidden');
        appCards.forEach(function(c) { c.classList.add('hidden'); });
        statusEl.textContent = 'Status: Disconnected';
      }
    }

    function toggleConnect() {
      var btn = document.getElementById('btnConnect');
      var statusEl = document.getElementById('connStatus');

      // Jika sedang connect → Disconnect
      if (client && client.connected) {
        client.end();
        statusEl.textContent = 'Status: Disconnecting...';
        return;
      }

      var host = document.getElementById('broker').value.trim();
      var port = document.getElementById('port').value.trim();
      var user = document.getElementById('username').value.trim();
      var pass = document.getElementById('password').value.trim();
      var cid = document.getElementById('clientId').value.trim();

      if (!host || !port) return alert('⚠️ Host dan Port wajib diisi!');
      if (port !== '8884') return alert('⚠️ HiveMQ Cloud WebSocket wajib pakai port 8884!');

      var url = 'wss://' + host + ':' + port + '/mqtt';
      log('🔄 Connecting to ' + url + '...');
      statusEl.textContent = 'Status: Connecting...';
      btn.textContent = '⏳ Connecting...';

      // ✅ PANGGIL 'mqtt.connect' DARI LIBRARY, SIMPAN KE 'client'
      client = mqtt.connect(url, {
        clientId: cid, username: user, password: pass,
        clean: true, reconnectPeriod: 0, connectTimeout: 10000
      });

      client.on('connect', function() {
        log('✅ MQTT Connected');
        setConnectionState(true);
        client.subscribe(DEVICE_ID + '/#');
      });

      client.on('error', function(err) {
        console.error('❌ MQTT Error:', err);
        log('❌ Error: ' + (err.message || 'Unknown'));
        setConnectionState(false);
        btn.textContent = '🔗 Connect';
      });

      client.on('close', function() {
        log('🔌 MQTT Disconnected');
        setConnectionState(false);
        btn.textContent = '🔗 Connect';
      });

      client.on('message', function(topic, message) {
        var msg = message.toString();
        if (topic.indexOf('/terminal') !== -1) log(msg);
        if (topic.indexOf('/status') !== -1) {
          try {
            var d = JSON.parse(msg);
            document.getElementById('sigVal').textContent = (d.rssi || '--') + '%';
            document.getElementById('upVal').textContent = d.uptime || '--';
            document.getElementById('tempVal').textContent = (d.temp || '--') + '°C';
            document.getElementById('fwVal').textContent = d.fw_version || '--';
          } catch(e) {}
        }
      });
    }

    function pub(topic, payload) {
      if (client && client.connected) {
        client.publish(topic, payload, { qos: 0 }, function(err) {
          if (err) log('❌ Publish Error'); else log('📤 ' + topic + ' -> ' + payload);
        });
      } else log('⚠️ MQTT Disconnected');
    }

    function updateNetwork() {
      var s = document.getElementById('netSsid').value.trim();
      if (!s) return alert('⚠️ SSID wajib diisi!');
      pub(DEVICE_ID + '/network/update', JSON.stringify({ ssid: s, pass: document.getElementById('netPass').value.trim() }));
      alert('✅ Perintah terkirim. Device akan restart.');
    }

    function resetWifi() {
      if (!confirm('⚠️ Reset WiFi ke AP Mode (192.168.4.1)?')) return;
      pub(DEVICE_ID + '/network/reset', '1');
      alert('🔄 Reset terkirim.');
    }
  </script>
</body>
</html>
