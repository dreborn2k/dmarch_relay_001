<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dMarch Relay Pro - Web Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--dark);
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            padding: 24px;
            margin-bottom: 20px;
        }
        .header { text-align: center; padding: 20px; color: white; }
        .header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 0.95rem; }
        .status-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .status-item {
            flex: 1; min-width: 120px; background: var(--light);
            padding: 12px; border-radius: 10px; text-align: center;
        }
        .status-item .label { font-size: 0.8rem; color: var(--gray); }
        .status-item .value { font-weight: 600; font-size: 1.1rem; }
        .status-item .value.good { color: var(--success); }
        .status-item .value.bad { color: var(--danger); }
        .connection-form {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px; margin-bottom: 20px;
        }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 0.85rem; font-weight: 500; color: var(--gray); }
        .form-group input {
            padding: 10px 14px; border: 2px solid #e2e8f0;
            border-radius: 8px; font-size: 1rem; transition: border-color 0.2s;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .btn {
            padding: 12px 24px; border: none; border-radius: 10px;
            font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 1rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .relay-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px; margin-top: 15px;
        }
        .relay-card {
            background: var(--light); border-radius: 12px; padding: 16px;
            text-align: center; border: 3px solid transparent; transition: all 0.2s;
        }
        .relay-card.active { border-color: var(--success); background: #f0fdf4; }
        .relay-card .name { font-weight: 600; margin-bottom: 8px; }
        .relay-card .status {
            font-size: 0.85rem; padding: 4px 12px; border-radius: 20px;
            display: inline-block; margin-bottom: 12px;
        }
        .relay-card .status.on { background: var(--success); color: white; }
        .relay-card .status.off { background: var(--gray); color: white; }
        .relay-card .controls { display: flex; gap: 8px; justify-content: center; }
        .btn-toggle { width: 100%; padding: 12px; font-weight: 600; transition: all 0.2s; }
        .relay-card.active .btn-toggle { background: #ef4444; color: white; }
        .relay-card.active .btn-toggle:hover { background: #dc2626; }
        .relay-card:not(.active) .btn-toggle { background: #22c55e; color: white; }
        .relay-card:not(.active) .btn-toggle:hover { background: #16a34a; }
        .bulk-controls { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .terminal {
            background: #1e293b; color: #22c55e; font-family: 'Monaco', 'Consolas', monospace;
            padding: 15px; border-radius: 10px; max-height: 200px;
            overflow-y: auto; font-size: 0.85rem; line-height: 1.5;
        }
        .terminal .log-time { color: #94a3b8; }
        .connection-status {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 20px; font-size: 0.9rem; font-weight: 500;
        }
        .connection-status.connected { background: #dcfce7; color: #166534; }
        .connection-status.disconnected { background: #fee2e2; color: #991b1b; }
        .connection-status .dot {
            width: 10px; height: 10px; border-radius: 50%; background: currentColor;
        }
        .settings-section { margin-top: 20px; padding-top: 20px; border-top: 2px solid #e2e8f0; }
        .settings-section h4 { margin-bottom: 15px; color: var(--gray); }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.4rem; }
            .connection-form { grid-template-columns: 1fr; }
            .bulk-controls { flex-direction: column; }
            .bulk-controls .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔌 dMarch Relay Pro</h1>
            <p>Web Control Panel - HiveMQ Cloud</p>
            <div id="connectionStatus" class="connection-status disconnected">
                <span class="dot"></span><span>Disconnected</span>
            </div>
        </div>

        <!-- Connection Form -->
        <div class="card">
            <h3 style="margin-bottom:15px;">🔗 Koneksi MQTT</h3>
            <div class="connection-form">
                <div class="form-group">
                    <label>Device ID</label>
                    <input type="text" id="deviceId" value="dmarch_relay_001">
                </div>
                <div class="form-group">
                    <label>Broker</label>
                    <input type="text" id="broker" value="ddac82518d464650bbfe8e03922a3ca8.s1.eu.hivemq.cloud">
                </div>
                <div class="form-group">
                    <label>Port (WSS)</label>
                    <input type="number" id="port" value="8884">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="mqttUser" value="dmarchFF">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="mqttPass" value="dmarchFF2205">
                </div>
            </div>
            <button id="connectBtn" class="btn btn-primary" onclick="connectMQTT()">🔗 Connect</button>
            <button id="disconnectBtn" class="btn btn-danger" onclick="disconnectMQTT()" disabled>❌ Disconnect</button>
        </div>

        <!-- System Status -->
        <div class="card">
            <h3 style="margin-bottom:15px;">📊 System Health</h3>
            <div class="status-bar">
                <div class="status-item">
                    <div class="label">Signal</div>
                    <div class="value" id="signalValue">--</div>
                </div>
                <div class="status-item">
                    <div class="label">Uptime</div>
                    <div class="value" id="uptimeValue">--</div>
                </div>
                <div class="status-item">
                    <div class="label">Temp</div>
                    <div class="value" id="tempValue">--°C</div>
                </div>
                <div class="status-item">
                    <div class="label">Last Update</div>
                    <div class="value" id="lastUpdate">--</div>
                </div>
            </div>
        </div>

        <!-- Relay Controls -->
        <div class="card">
            <h3 style="margin-bottom:15px;">⚡ Relay Control</h3>
            <div class="bulk-controls">
                <button class="btn btn-success" onclick="publishAll(1)" id="allOnBtn" disabled>▶️ ALL ON</button>
                <button class="btn btn-danger" onclick="publishAll(0)" id="allOffBtn" disabled>⏹️ ALL OFF</button>
            </div>
            <div class="relay-grid" id="relayGrid"></div>
        </div>

        <!-- Settings Section (NTP, GPIO, OTA) -->
        <div class="card">
            <h3 style="margin-bottom:15px;">⚙️ Settings</h3>
            
            <div class="settings-section">
                <h4>🕐 NTP Server</h4>
                <div class="connection-form" style="grid-template-columns: 2fr 1fr auto;">
                    <div class="form-group">
                        <label>Server NTP</label>
                        <input type="text" id="ntpServer" value="id.pool.ntp.org" placeholder="id.pool.ntp.org">
                    </div>
                    <div class="form-group">
                        <label>Timezone (Jam)</label>
                        <input type="number" id="tzOffset" value="7" placeholder="7">
                    </div>
                    <div class="form-group" style="justify-content: flex-end;">
                        <label>&nbsp;</label>
                        <button class="btn btn-primary" onclick="publishNTP()" id="ntpBtn" disabled>💾 Save</button>
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <h4>🔌 GPIO Pin Mapping</h4>
                <div class="connection-form" style="grid-template-columns: 2fr auto;">
                    <div class="form-group">
                        <label>Pin (comma separated, e.g., 12,14,27,26,25)</label>
                        <input type="text" id="gpioPins" value="12,14,27,26,25" placeholder="12,14,27,26,25">
                    </div>
                    <div class="form-group" style="justify-content: flex-end;">
                        <label>&nbsp;</label>
                        <button class="btn btn-warning" onclick="publishGPIO()" id="gpioBtn" disabled>💾 Update</button>
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <h4>🔄 System</h4>
                <div class="bulk-controls">
                    <button class="btn btn-primary" onclick="publishOTA()" id="otaBtn" disabled>⬇️ Check OTA</button>
                    <button class="btn btn-warning" onclick="publishRestart()" id="restartBtn" disabled>🔄 Restart</button>
                </div>
            </div>
        </div>

        <!-- Terminal / Log -->
        <div class="card">
            <h3 style="margin-bottom:15px;">📝 Terminal Log</h3>
            <div class="terminal" id="terminal"></div>
            <button class="btn" style="margin-top:10px; background:#64748b; color:white;" onclick="clearTerminal()">🗑️ Clear Log</button>
        </div>
    </div>

    <script>
        // ==========================================
        // KONFIGURASI DEFAULT
        // ==========================================
        const DEFAULT_CONFIG = {
            deviceId: 'dmarch_relay_001',
            broker: 'ddac82518d464650bbfe8e03922a3ca8.s1.eu.hivemq.cloud',
            port: 8884,
            path: '/mqtt',
            username: 'dmarchFF',
            password: 'dmarchFF2205'
        };

        // ==========================================
        // VARIABEL GLOBAL
        // ==========================================
        let client = null;
        let isConnected = false;
        const relayStates = [0, 0, 0, 0, 0];
        const relayLabels = ['Relay 1', 'Relay 2', 'Relay 3', 'Relay 4', 'Relay 5'];

        // ==========================================
        // FUNGSI UTILITY
        // ==========================================
        function logToTerminal(message) {
            const terminal = document.getElementById('terminal');
            const time = new Date().toLocaleTimeString('id-ID');
            const logEntry = `<div><span class="log-time">[${time}]</span> ${message}</div>`;
            terminal.innerHTML += logEntry;
            terminal.scrollTop = terminal.scrollHeight;
        }

        function clearTerminal() {
            document.getElementById('terminal').innerHTML = '';
        }

        function updateConnectionStatus(connected) {
            isConnected = connected;
            const statusEl = document.getElementById('connectionStatus');
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const allOnBtn = document.getElementById('allOnBtn');
            const allOffBtn = document.getElementById('allOffBtn');
            const ntpBtn = document.getElementById('ntpBtn');
            const gpioBtn = document.getElementById('gpioBtn');
            const otaBtn = document.getElementById('otaBtn');
            const restartBtn = document.getElementById('restartBtn');

            if (connected) {
                statusEl.className = 'connection-status connected';
                statusEl.innerHTML = '<span class="dot"></span><span>Connected ✓</span>';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                allOnBtn.disabled = false;
                allOffBtn.disabled = false;
                ntpBtn.disabled = false;
                gpioBtn.disabled = false;
                otaBtn.disabled = false;
                restartBtn.disabled = false;
                
                // Enable all relay toggle buttons
                for (let i = 1; i <= 5; i++) {
                    const toggleBtn = document.getElementById(`btn-toggle-${i}`);
                    if (toggleBtn) toggleBtn.disabled = false;
                }
                
                logToTerminal('✅ Terhubung ke MQTT Broker');
            } else {
                statusEl.className = 'connection-status disconnected';
                statusEl.innerHTML = '<span class="dot"></span><span>Disconnected</span>';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                allOnBtn.disabled = true;
                allOffBtn.disabled = true;
                ntpBtn.disabled = true;
                gpioBtn.disabled = true;
                otaBtn.disabled = true;
                restartBtn.disabled = true;
                
                // Disable all relay toggle buttons
                for (let i = 1; i <= 5; i++) {
                    const toggleBtn = document.getElementById(`btn-toggle-${i}`);
                    if (toggleBtn) toggleBtn.disabled = true;
                }
            }
        }

        function updateSystemHealth(data) {
            if (data.rssi !== undefined) {
                const signalEl = document.getElementById('signalValue');
                signalEl.textContent = data.rssi + '%';
                signalEl.className = data.rssi >= 50 ? 'value good' : 'value bad';
            }
            if (data.uptime) {
                document.getElementById('uptimeValue').textContent = data.uptime;
            }
            if (data.temp !== undefined) {
                document.getElementById('tempValue').textContent = data.temp + '°C';
            }
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('id-ID');
        }

        function updateRelayUI(relayNum, state) {
            const idx = relayNum - 1;
            relayStates[idx] = state;
            const card = document.getElementById(`relay-${relayNum}`);
            const statusEl = card.querySelector('.status');
            const toggleBtn = card.querySelector('.btn-toggle');

            if (state === 1) {
                card.classList.add('active');
                statusEl.textContent = 'ON';
                statusEl.className = 'status on';
                toggleBtn.textContent = '🛑 MATIKAN';
                toggleBtn.className = 'btn btn-danger btn-toggle';
            } else {
                card.classList.remove('active');
                statusEl.textContent = 'OFF';
                statusEl.className = 'status off';
                toggleBtn.textContent = '⚡ NYALAKAN';
                toggleBtn.className = 'btn btn-success btn-toggle';
            }
        }

        function generateRelayCards() {
            const grid = document.getElementById('relayGrid');
            grid.innerHTML = '';

            for (let i = 1; i <= 5; i++) {
                const card = document.createElement('div');
                card.className = 'relay-card';
                card.id = `relay-${i}`;
                card.innerHTML = `
                    <div class="name">${relayLabels[i-1]}</div>
                    <div class="status off">OFF</div>
                    <div class="controls">
                        <button class="btn btn-toggle" id="btn-toggle-${i}" 
                                onclick="toggleRelay(${i})" disabled>
                            ⚡ NYALAKAN
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        // ==========================================
        // FUNGSI MQTT - PAHO LIBRARY
        // ==========================================
        function connectMQTT() {
            const deviceId = document.getElementById('deviceId').value.trim();
            const broker = document.getElementById('broker').value.trim();
            const port = parseInt(document.getElementById('port').value);
            const username = document.getElementById('mqttUser').value.trim();
            const password = document.getElementById('mqttPass').value.trim();

            if (!broker || !port || !username) {
                alert('Mohon lengkapi konfigurasi broker!');
                return;
            }

            logToTerminal(`🔗 Connecting to ${broker}:${port}...`);

            const clientId = 'web_ui_' + Math.random().toString(16).substr(2, 8);

            client = new Paho.MQTT.Client(broker, port, '/mqtt', clientId);

            client.onConnectionLost = onConnectionLost;
            client.onMessageArrived = onMessageArrived;

            const connectOptions = {
                onSuccess: onConnect,
                onFailure: onConnectFailure,
                userName: username,
                password: password,
                useSSL: true,
                timeout: 10,
                keepAliveInterval: 60,
                cleanSession: true
            };

            client.connect(connectOptions);
        }

        function onConnect() {
            logToTerminal('✅ MQTT Connected!');
            updateConnectionStatus(true);

            const deviceId = document.getElementById('deviceId').value.trim();
            const topics = [
                `${deviceId}/relay/+/state`,
                `${deviceId}/status`,
                `${deviceId}/terminal`
            ];

            topics.forEach(topic => {
                client.subscribe(topic, { qos: 1 });
                logToTerminal(`📥 Subscribe: ${topic}`);
            });
        }

        function onConnectFailure(response) {
            logToTerminal(`❌ Connection failed: ${response.errorMessage}`);
            updateConnectionStatus(false);
            
            if (response.errorMessage.includes('AMQJS0013E')) {
                alert('Error: Pastikan host tanpa ws://, port integer, dan path /mqtt');
            } else if (response.errorMessage.includes('AMQJS0007E')) {
                alert('Error: Periksa useSSL:true dan port 8884');
            } else if (response.errorMessage.includes('Authentication')) {
                alert('Error: Username atau Password salah!');
            }
        }

        function onConnectionLost(response) {
            if (response.errorCode !== 0) {
                logToTerminal(`⚠️ Connection lost: ${response.errorMessage}`);
            }
            updateConnectionStatus(false);
            
            setTimeout(() => {
                if (!isConnected) {
                    logToTerminal('🔄 Attempting reconnect...');
                    connectMQTT();
                }
            }, 5000);
        }

        function onMessageArrived(message) {
            const topic = message.destinationName;
            const payload = message.payloadString;
            const deviceId = document.getElementById('deviceId').value.trim();

            // ✅ FILTER: Jangan tampilkan /status di Terminal Log
            if (topic === `${deviceId}/status`) {
                try {
                    const data = JSON.parse(payload);
                    updateSystemHealth(data);
                } catch (e) {
                    console.log('Failed to parse status JSON');
                }
                return;
            }

            logToTerminal(`📩 ${topic}: ${payload}`);

            if (topic.match(`${deviceId}/relay/\\d+/state`)) {
                const match = topic.match(/relay\/(\d+)\/state/);
                if (match) {
                    const relayNum = parseInt(match[1]);
                    const state = parseInt(payload);
                    updateRelayUI(relayNum, state);
                }
            }
        }

        function disconnectMQTT() {
            if (client && client.isConnected()) {
                client.disconnect();
                logToTerminal('❌ Disconnected from MQTT');
            }
            updateConnectionStatus(false);
        }

        // ==========================================
        // FUNGSI PUBLISH
        // ==========================================
        function publish(topic, message, retained = false) {
            if (!client || !client.isConnected()) {
                alert('Tidak terhubung ke MQTT!');
                return;
            }
            const msg = new Paho.MQTT.Message(message);
            msg.destinationName = topic;
            msg.qos = 1;
            msg.retained = retained;
            client.send(msg);
            logToTerminal(`📤 Publish: ${topic} = ${message}`);
        }

        function publishRelay(relayNum, state) {
            const deviceId = document.getElementById('deviceId').value.trim();
            publish(`${deviceId}/relay/${relayNum}/cmd`, state.toString());
        }

        function toggleRelay(relayNum) {
            const newState = relayStates[relayNum - 1] === 1 ? 0 : 1;
            publishRelay(relayNum, newState);
        }

        function publishAll(state) {
            const deviceId = document.getElementById('deviceId').value.trim();
            publish(`${deviceId}/all/${state === 1 ? 'on' : 'off'}`, '1');
        }

        // ✅ SETTINGS FUNCTIONS
        function publishNTP() {
            const deviceId = document.getElementById('deviceId').value.trim();
            const ntpServer = document.getElementById('ntpServer').value.trim();
            const tzOffset = document.getElementById('tzOffset').value.trim();
            
            if (ntpServer) {
                publish(`${deviceId}/ntp/set`, ntpServer);
            }
            if (tzOffset) {
                publish(`${deviceId}/timezone/set`, tzOffset);
            }
        }

        function publishGPIO() {
            const deviceId = document.getElementById('deviceId').value.trim();
            const gpioPins = document.getElementById('gpioPins').value.trim();
            
            if (gpioPins) {
                if (confirm('Update GPIO pins? Device will restart after saving.')) {
                    publish(`${deviceId}/gpio/update`, gpioPins);
                }
            }
        }

        function publishOTA() {
            const deviceId = document.getElementById('deviceId').value.trim();
            if (confirm('Check for firmware update?')) {
                publish(`${deviceId}/system/ota`, '1');
            }
        }

        function publishRestart() {
            const deviceId = document.getElementById('deviceId').value.trim();
            if (confirm('Restart device?')) {
                publish(`${deviceId}/system/restart`, '1');
            }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('deviceId').value = DEFAULT_CONFIG.deviceId;
            document.getElementById('broker').value = DEFAULT_CONFIG.broker;
            document.getElementById('port').value = DEFAULT_CONFIG.port;
            document.getElementById('mqttUser').value = DEFAULT_CONFIG.username;
            document.getElementById('mqttPass').value = DEFAULT_CONFIG.password;

            generateRelayCards();
            logToTerminal('🚀 Web UI Loaded. Klik Connect untuk mulai.');
        });
    </script>
</body>
</html>
