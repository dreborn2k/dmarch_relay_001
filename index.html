<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dMarch Relay Pro - Web Control</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <link rel="icon" href="image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

  <style>
    :root { 
      --bg:#0f172a; 
      --card:#1e293b; 
      --text:#e2e8f0; 
      --accent:#38bdf8; 
      --success:#10b981; 
      --danger:#ef4444; 
      --border:#334155; 
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      padding: 20px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    .card {
      background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    h2, h3 { color: var(--accent); margin-bottom: 15px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 14px; margin-bottom: 5px; color: #94a3b8; }
    input, select {
      width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border);
      background: #0f172a; color: var(--text); font-size: 14px;
    }
    .btn-primary {
      background: var(--accent); color: #0f172a; font-weight: bold; padding: 12px;
      border: none; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px;
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-secondary {
      background: var(--border); color: var(--text); padding: 12px; border: none;
      border-radius: 6px; cursor: pointer; font-weight: bold; text-align: center;
    }
    .relay-grid {
      display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px;
    }
    .relay-grid button {
      padding: 16px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none;
      cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      transition: all 0.2s ease;
    }
    
    /* Status Dot */
    .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .status-dot.on { background-color: #fff; box-shadow: 0 0 8px #fff; }
    .status-dot.off { background-color: #64748b; }

    #terminal {
      background: #000; color: #10b981; font-family: monospace; padding: 12px;
      border-radius: 6px; height: 120px; overflow-y: auto; font-size: 12px;
    }
    
    /* CSS QR Scanner & Elemen Tersembunyi bawaan file asli */
    #reader { width: 100%; margin-bottom: 15px; border-radius: 8px; overflow: hidden; }
    .hidden { display: none; }
    .status-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
    .status-label { color: #94a3b8; }
    .status-value { font-weight: bold; color: var(--accent); }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="card">
      <h2>🔌 MQTT Connection</h2>
      <div id="reader" class="hidden"></div>
      
      <div class="form-group">
        <label>Broker URL</label>
        <input type="text" id="brokerUrl" value="wss://ddac82518d464650bbfe8e03922a3ca8.s1.eu.hivemq.cloud:8884/mqtt">
      </div>
      <div class="grid">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" value="dmarchFF">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" value="dmarchFF2205">
        </div>
      </div>
      <div class="grid">
        <div class="form-group">
          <label>Client ID</label>
          <input type="text" id="clientId">
        </div>
        <div class="form-group">
          <label>Device ID</label>
          <input type="text" id="deviceId" value="dmarch_relay_001">
        </div>
      </div>
      
      <button id="btnConnect" class="btn-primary">🔗 Connect</button>
      <button id="disconnectBtn" class="btn-primary" style="background:var(--danger); color:#fff; display:none;">🔌 Disconnect</button>
      <button id="btnScan" class="btn-secondary" style="width:100%; margin-top:10px;">📷 Scan QR</button>
    </div>

    <div class="card">
      <h3>📊 System Status</h3>
      <div class="status-item">
        <span class="status-label">Sinyal WiFi:</span>
        <span class="status-value" id="sigVal">--%</span>
      </div>
      <div class="status-item">
        <span class="status-label">Suhu ESP:</span>
        <span class="status-value" id="tempVal">--°C</span>
      </div>
      <div class="status-item">
        <span class="status-label">Uptime:</span>
        <span class="status-value" id="upVal">--</span>
      </div>
      <div class="status-item">
        <span class="status-label">Firmware:</span>
        <span class="status-value" id="fwVal">--</span>
      </div>
    </div>

    <div class="card">
      <h3>🎛️ Manual Control</h3>
      <div class="grid" style="margin-bottom: 15px;">
        <button id="allOnBtn" class="btn-secondary" style="background:var(--accent); color:#0f172a;">ALL ON</button>
        <button id="allOffBtn" class="btn-secondary" style="background:var(--danger); color:#fff;">ALL OFF</button>
      </div>
      
      <div class="relay-grid" id="relayBtns">
        <button id="btn-relay-1" class="btn-secondary" data-state="off" onclick="sendRelayCommand(1)">
          <span>Relay 1</span> <span class="status-dot off"></span>
        </button>
        <button id="btn-relay-2" class="btn-secondary" data-state="off" onclick="sendRelayCommand(2)">
          <span>Relay 2</span> <span class="status-dot off"></span>
        </button>
        <button id="btn-relay-3" class="btn-secondary" data-state="off" onclick="sendRelayCommand(3)">
          <span>Relay 3</span> <span class="status-dot off"></span>
        </button>
        <button id="btn-relay-4" class="btn-secondary" data-state="off" onclick="sendRelayCommand(4)">
          <span>Relay 4</span> <span class="status-dot off"></span>
        </button>
        <button id="btn-relay-5" class="btn-secondary" data-state="off" onclick="sendRelayCommand(5)">
          <span>Relay 5</span> <span class="status-dot off"></span>
        </button>
      </div>
    </div>

    <div class="card">
      <h3>💻 Terminal Log</h3>
      <div id="terminal">Menunggu data...</div>
    </div>

  </div>

  <script>
    var mqttClient = null;
    var DEVICE = "dmarch_relay_001";
    var qrScanner = null;

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('clientId').value = 'web_' + Math.random().toString(16).substr(2, 8);
      document.getElementById('deviceId').value = DEVICE;
      loadFromStorage();

      // Tombol Event Listener
      document.getElementById('btnConnect').onclick = toggleConnect;
      document.getElementById('disconnectBtn').onclick = toggleConnect;
      document.getElementById('allOnBtn').onclick = function(){ pub(DEVICE + '/all/on', '1'); };
      document.getElementById('allOffBtn').onclick = function(){ pub(DEVICE + '/all/off', '1'); };
      document.getElementById('btnScan').onclick = toggleQRScanner;
    });

    function log(msg) {
      var t = document.getElementById('terminal');
      t.innerHTML += '[' + new Date().toLocaleTimeString() + '] ' + msg + '<br>';
      t.scrollTop = t.scrollHeight;
    }

    function setConnectionState(connected) {
      var btn = document.getElementById('btnConnect');
      var disBtn = document.getElementById('disconnectBtn');
      if(connected) {
        btn.style.display = 'none';
        disBtn.style.display = 'block';
      } else {
        btn.style.display = 'block';
        disBtn.style.display = 'none';
      }
    }

    function saveToStorage() {
      localStorage.setItem('brokerUrl', document.getElementById('brokerUrl').value);
      localStorage.setItem('username', document.getElementById('username').value);
      localStorage.setItem('password', document.getElementById('password').value);
    }

    function loadFromStorage() {
      if(localStorage.getItem('brokerUrl')) document.getElementById('brokerUrl').value = localStorage.getItem('brokerUrl');
      if(localStorage.getItem('username')) document.getElementById('username').value = localStorage.getItem('username');
      if(localStorage.getItem('password')) document.getElementById('password').value = localStorage.getItem('password');
    }

    function toggleConnect() {
      if(mqttClient && mqttClient.connected) {
        mqttClient.end();
        return;
      }
      saveToStorage();
      var url = document.getElementById('brokerUrl').value;
      var u = document.getElementById('username').value;
      var pw = document.getElementById('password').value;
      DEVICE = document.getElementById('deviceId').value;

      log('Menghubungkan ke Broker...');
      
      mqttClient = mqtt.connect(url, { 
        clientId: document.getElementById('clientId').value, 
        username: u, 
        password: pw, 
        clean: true, 
        reconnectPeriod: 5000 
      });
      
      mqttClient.on('connect', function(){ 
        log('✅ MQTT Connected'); 
        setConnectionState(true); 
        mqttClient.subscribe(DEVICE + '/#'); 
      });

      mqttClient.on('error', function(err){ 
        log('❌ Error: ' + (err.message || 'Unknown')); 
        setConnectionState(false); 
      });
      
      mqttClient.on('close', function(){ 
        log('🔌 Disconnected'); 
        setConnectionState(false); 
      });
      
      mqttClient.on('message', function(topic, msg) {
        var m = msg.toString();
        
        if(topic.indexOf('/terminal') !== -1) log('ESP: ' + m);
        if(topic.indexOf('/status') !== -1) {
          try { 
            var d = JSON.parse(m); 
            document.getElementById('sigVal').textContent = (d.rssi || '--') + '%'; 
            document.getElementById('upVal').textContent = d.uptime || '--'; 
            document.getElementById('tempVal').textContent = (d.temp || '--') + '°C'; 
            document.getElementById('fwVal').textContent = d.fw_version || '--'; 
          } catch(e){}
        }

        // 🔔 TANGKAP STATE RELAY DAN UPDATE UI
        if (topic.startsWith(DEVICE + '/relay/') && topic.endsWith('/state')) {
          var parts = topic.split('/');
          var num = parseInt(parts[2]);
          var state = parseInt(m);
          
          var btn = document.getElementById('btn-relay-' + num);
          if (btn) {
            var isOn = (state === 1);
            btn.dataset.state = isOn ? "on" : "off";
            
            // Mengubah style tombol langsung agar transisi warna berjalan
            btn.style.background = isOn ? 'var(--success)' : 'var(--border)';
            btn.style.color = isOn ? '#fff' : 'var(--text)';
            
            // Format teks persis seperti file index(1).html Anda
            btn.innerHTML = isOn ? 
              `Relay ${num} <span class="status-dot on"></span> ON` : 
              `Relay ${num} <span class="status-dot off"></span> OFF`;
          }
        }
      });
    }

    // HANDLER KLIK TOMBOL (Hanya publish, UI menunggu ESP membalas ke topik /state)
    function sendRelayCommand(num) {
      if (!mqttClient || !mqttClient.connected) {
        alert('⚠️ MQTT belum terhubung!');
        return;
      }
      var btn = document.getElementById('btn-relay-' + num);
      var currentState = btn ? btn.dataset.state : 'off';
      var cmd = currentState === 'on' ? '0' : '1';
      
      mqttClient.publish(DEVICE + '/relay/' + num + '/cmd', cmd);
      
      // Feedback efek sentuhan cepat
      if(btn) {
        btn.style.opacity = '0.7';
        setTimeout(() => btn.style.opacity = '1', 100);
      }
    }

    function pub(topic, payload) {
      if(!mqttClient || !mqttClient.connected) {
        alert('⚠️ MQTT belum terhubung!');
        return;
      }
      mqttClient.publish(topic, payload);
    }

    // KODE QR SCANNER (Elemen yang sempat hilang sebelumnya)
    function toggleQRScanner() {
      var readerElem = document.getElementById('reader');
      var btnScan = document.getElementById('btnScan');
      
      if (readerElem.classList.contains('hidden')) {
        readerElem.classList.remove('hidden');
        btnScan.textContent = "🛑 Stop Scan";
        
        qrScanner = new Html5Qrcode("reader");
        qrScanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: 250 },
          function(qrText) {
            try {
              var data = JSON.parse(qrText);
              if (data.broker) document.getElementById('brokerUrl').value = data.broker;
              if (data.user) document.getElementById('username').value = data.user;
              if (data.pass) document.getElementById('password').value = data.pass;
              if (data.device) document.getElementById('deviceId').value = data.device;
              log('📸 QR Berhasil Discan!');
              toggleQRScanner(); 
            } catch(e) {
              log('❌ Format QR tidak valid!');
            }
          },
          function(err) { }
        ).catch(err => log('❌ Gagal akses kamera: ' + err));
      } else {
        readerElem.classList.add('hidden');
        btnScan.textContent = "📷 Scan QR";
        if (qrScanner) {
          qrScanner.stop().then(() => qrScanner.clear());
        }
      }
    }
  </script>
</body>
</html>
