<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dMarch Relay Pro - Web Control</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    :root { 
      --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; 
      --accent: #38bdf8; --success: #10b981; --danger: #ef4444; --border: #334155; 
    }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    h1, h2, h3 { margin: 0 0 15px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat { text-align: center; }
    .stat-value { font-size: 1.4rem; font-weight: bold; color: var(--accent); }
    .stat-label { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
    input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin: 8px 0 12px; font-size: 14px; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 5px; transition: 0.2s; font-size: 14px; }
    button:hover { opacity: 0.9; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
    .status-on { background: var(--success); }
    .status-off { background: var(--danger); }
    .terminal { background: #000; color: #0f0; font-family: monospace; padding: 10px; border-radius: 8px; height: 150px; overflow-y: auto; font-size: 0.8rem; margin-top: 10px; white-space: pre-wrap; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔌 dMarch Relay Pro</h1>
    <p style="margin:-10px 0 20px; color:#94a3b8;">Web Control Panel - HiveMQ Cloud</p>

    <!-- MQTT Connection -->
    <div class="card">
      <h3>🔗 Koneksi MQTT</h3>
      <div class="grid-2">
        <input type="text" id="broker" placeholder="Broker (wss://...)" value="wss://ddac82518d464650bbfe8e03922a3ca8.s1.eu.hivemq.cloud:8884/mqtt">
        <input type="text" id="clientId" placeholder="Client ID" value="">
        <input type="text" id="username" placeholder="Username" value="dmarchFF">
        <input type="password" id="password" placeholder="Password" value="dmarchFF2205">
      </div>
      <button class="btn-primary" id="btnConnect" onclick="toggleConnect()">🔗 Connect</button>
      <p id="connStatus" style="text-align:center; margin-top:12px;"><span class="status-dot status-off"></span>Disconnected</p>
    </div>

    <!-- System Health -->
    <div class="card">
      <h3>📊 System Health</h3>
      <div class="grid-2">
        <div class="stat"><div class="stat-value" id="sigVal">--</div><div class="stat-label">Signal</div></div>
        <div class="stat"><div class="stat-value" id="upVal">--</div><div class="stat-label">Uptime</div></div>
        <div class="stat"><div class="stat-value" id="tempVal">--°C</div><div class="stat-label">Temp</div></div>
        <div class="stat"><div class="stat-value" id="fwVal">--</div><div class="stat-label">FW Version</div></div>
      </div>
    </div>

    <!-- Relay Control -->
    <div class="card">
      <h3>⚡ Relay Control</h3>
      <div class="grid-2">
        <button class="btn-success" onclick="pub('dmarch_relay_001/all/on', '1')">▶️ ALL ON</button>
        <button class="btn-danger" onclick="pub('dmarch_relay_001/all/off', '1')">⏹️ ALL OFF</button>
      </div>
      <div class="grid-2" style="margin-top:12px;" id="relayBtns"></div>
    </div>

    <!-- Settings -->
    <div class="card">
      <h3>⚙️ Settings</h3>
      <label>🕐 NTP Server</label>
      <select id="ntpSelect">
        <option value="id.pool.ntp.org">id.pool.ntp.org (Indonesia)</option>
        <option value="pool.ntp.org">pool.ntp.org (Global)</option>
        <option value="time.google.com">time.google.com (Google)</option>
        <option value="time.cloudflare.com">time.cloudflare.com (Cloudflare)</option>
        <option value="time.windows.com">time.windows.com (Windows)</option>
      </select>
      <input type="number" id="tzInput" placeholder="Timezone (Jam)" value="7">
      <button class="btn-primary" onclick="saveNTP()">💾 Save NTP & Timezone</button>
      <label style="margin-top:12px;">🔌 GPIO Pin Mapping</label>
      <input type="text" id="gpioInput" placeholder="Pin (comma separated, e.g., 12,14,27,26,25)">
      <button class="btn-primary" onclick="updateGPIO()">💾 Update GPIO</button>
    </div>

    <!-- 🌐 NETWORK SETTINGS CARD (Hidden until Connected) -->
    <div class="card hidden" id="networkCard">
      <h3>🌐 Network Settings</h3>
      <label>SSID WiFi Baru</label>
      <input type="text" id="netSsid" placeholder="Masukkan SSID WiFi">
      <label>Password WiFi Baru</label>
      <input type="password" id="netPass" placeholder="Masukkan Password WiFi">
      <button class="btn-success" onclick="updateNetwork()">💾 Update Network</button>
      <button class="btn-danger" style="margin-top:10px;" onclick="resetWifi()">🔄 Reset WiFi (AP Mode)</button>
    </div>

    <!-- System Controls -->
    <div class="card">
      <h3>🔄 System</h3>
      <div class="grid-2">
        <button class="btn-primary" onclick="pub('dmarch_relay_001/system/ota', '1')">⬇️ Check OTA</button>
        <button class="btn-danger" onclick="pub('dmarch_relay_001/system/restart', '1')">🔄 Restart</button>
      </div>
    </div>

    <!-- Terminal -->
    <div class="card">
      <h3>📝 Terminal Log</h3>
      <div class="terminal" id="terminal"></div>
      <button class="btn-secondary" style="margin-top:10px;" onclick="document.getElementById('terminal').innerHTML=''">🗑️ Clear Log</button>
    </div>
  </div>

  <script>
    let mqtt = null;
    const DEVICE_ID = "dmarch_relay_001";
    document.getElementById('clientId').value = 'web_' + Math.random().toString(16).substr(2, 8);
    
    // Generate Relay Buttons
    const relayContainer = document.getElementById('relayBtns');
    for(let i=1; i<=5; i++) {
      const btn = document.createElement('button');
      btn.className = 'btn-secondary';
      btn.textContent = `Relay ${i}`;
      btn.onclick = () => pub(`${DEVICE_ID}/relay/${i}/cmd`, '1');
      relayContainer.appendChild(btn);
    }

    function log(msg) {
      const term = document.getElementById('terminal');
      term.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}\n` + term.innerHTML;
    }

    function updateConnectionStatus(connected) {
      const statusEl = document.getElementById('connStatus');
      const netCard = document.getElementById('networkCard');
      if (connected) {
        statusEl.innerHTML = '<span class="status-dot status-on"></span>Connected';
        netCard.classList.remove('hidden'); // Unhide saat online
      } else {
        statusEl.innerHTML = '<span class="status-dot status-off"></span>Disconnected';
        netCard.classList.add('hidden');    // Hide saat disconnect
      }
    }

    function toggleConnect() {
      const btn = document.getElementById('btnConnect');
      if (mqtt && mqtt.connected) {
        mqtt.end();
        btn.textContent = '🔗 Connect';
        updateConnectionStatus(false);
        return;
      }
      const broker = document.getElementById('broker').value;
      const opts = {
        clientId: document.getElementById('clientId').value,
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        clean: true, reconnectPeriod: 0
      };
      log(`Connecting to ${broker}...`);
      mqtt = mqtt.connect(broker, opts);
      btn.textContent = '❌ Disconnect';

      mqtt.on('connect', () => { log('✅ MQTT Connected'); updateConnectionStatus(true); mqtt.subscribe(DEVICE_ID + '/#'); });
      mqtt.on('message', (topic, message) => {
        const msg = message.toString();
        if (topic.includes('/terminal')) log(msg);
        if (topic.includes('/status')) {
          try {
            const d = JSON.parse(msg);
            document.getElementById('sigVal').textContent = d.rssi + '%';
            document.getElementById('upVal').textContent = d.uptime;
            document.getElementById('tempVal').textContent = d.temp + '°C';
            document.getElementById('fwVal').textContent = d.fw_version;
          } catch(e) {}
        }
      });
      mqtt.on('error', err => log('❌ ' + err.message));
      mqtt.on('close', () => { updateConnectionStatus(false); });
    }

    function pub(topic, payload) {
      if (mqtt && mqtt.connected) { mqtt.publish(topic, payload); log(`📤 ${topic} -> ${payload}`); }
      else log('⚠️ MQTT Disconnected');
    }

    function saveNTP() { pub(DEVICE_ID + '/ntp/set', document.getElementById('ntpSelect').value); pub(DEVICE_ID + '/timezone/set', document.getElementById('tzInput').value); }
    function updateGPIO() { pub(DEVICE_ID + '/gpio/update', document.getElementById('gpioInput').value); }

    function updateNetwork() {
      const s = document.getElementById('netSsid').value.trim();
      const p = document.getElementById('netPass').value.trim();
      if (!s) return alert('⚠️ SSID wajib diisi!');
      pub(DEVICE_ID + '/network/update', JSON.stringify({ ssid: s, pass: p }));
      alert('✅ Perintah Update Network terkirim. Device akan restart otomatis.');
    }

    function resetWifi() {
      if (!confirm('⚠️ Reset konfigurasi WiFi?\nDevice akan restart ke Mode AP (192.168.4.1).')) return;
      pub(DEVICE_ID + '/network/reset', '1');
      alert('🔄 Perintah Reset WiFi terkirim.');
    }
  </script>
</body>
</html>
