<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>dMarch Relay Pro | Professional IoT Relay Controller</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⚡%3C/text%3E%3C/svg%3E">
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --accent:#38bdf8; --success:#10b981; --danger:#ef4444; --border:#334155; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 650px; margin: 0 auto; width: 100%; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; padding: 20px; }
    .card.collapsible { padding: 0; overflow: hidden; }
    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; cursor: pointer; }
    .card-content { padding: 0 20px 20px 20px; }
    .card.collapsed .card-content { display: none; }
    h1 { text-align: center; margin-bottom: 5px; font-size: 1.8rem; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 20px; font-size: 0.9rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: #94a3b8; }
    input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; }
    .stat-val { font-size: 1.1rem; font-weight: bold; color: var(--accent); }
    .stat-lbl { font-size: 0.7rem; color: #94a3b8; }
    .terminal { background: #000; color: #0f0; font-family: monospace; padding: 10px; border-radius: 8px; height: 120px; overflow-y: auto; font-size: 0.75rem; white-space: pre-wrap; margin-bottom: 10px; }
    .hidden { display: none !important; }
    #qrModal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; display:none; align-items:center; justify-content:center; }
    .modal-box { background:var(--card); border-radius:12px; padding:20px; width:90%; max-width:400px; }
    #reader { width: 100%; border-radius: 8px; overflow: hidden; }
    .day-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
    .day-btn { padding:6px 0; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--text); font-size:0.7rem; }
    .day-btn.active { background:var(--accent); color:#000; }
    .schedule-item { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px; display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; font-size: 0.85rem; }
    .toggle-switch { position:relative; width:36px; height:20px; background:#475569; border-radius:10px; cursor:pointer; }
    .toggle-switch::after { content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; background:#fff; border-radius:50%; transition:0.3s; }
    .toggle-switch.active { background:var(--success); }
    .toggle-switch.active::after { left:18px; }
    .label-edit-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .label-edit-item span { width: 70px; font-size: 0.8rem; color: #94a3b8; }
  </style>
</head>
<body>

<div class="container">
  <h1>🔌 dMarch Relay Pro</h1>
  <p class="subtitle">Industrial IoT Controller</p>

  <div class="card" id="connCard">
    <h3 style="color:var(--accent); margin-bottom:15px;">🔗 Setup Device</h3>
    <button class="btn-primary" onclick="openQR()">📷 Scan QR Configuration</button>
    <p id="connStatus" style="text-align:center; margin-top:15px; font-size:0.85rem; color:#94a3b8;">Status: Not Configured</p>
  </div>

  <button id="disconnectBtn" class="btn-danger hidden" style="margin-bottom:20px;">🔌 Disconnect & Reset</button>

  <div class="card app-card hidden" id="healthCard">
    <div class="stat-grid">
      <div><div class="stat-val" id="sigVal">--</div><div class="stat-lbl">Signal</div></div>
      <div><div class="stat-val" id="upVal">--</div><div class="stat-lbl">Uptime</div></div>
      <div><div class="stat-val" id="tempVal">--</div><div class="stat-lbl">Temp</div></div>
      <div><div class="stat-val" id="fwVal">--</div><div class="stat-lbl">Version</div></div>
    </div>
  </div>

  <div class="card app-card hidden">
    <h3 style="margin-bottom:15px; color:var(--accent);">⚡ Relay Control</h3>
    <div class="grid-2" style="margin-bottom:15px;">
      <button class="btn-success" onclick="pub(DEVICE_ID+'/all/on','1')">ALL ON</button>
      <button class="btn-danger" onclick="pub(DEVICE_ID+'/all/off','1')">ALL OFF</button>
    </div>
    <div class="grid-4" id="relayBtns"></div>
  </div>

  <div class="card collapsible collapsed app-card hidden">
    <div class="card-header"><h3>⚙️ Relay & Label Settings</h3><span>▼</span></div>
    <div class="card-content">
      <div class="form-group">
        <label>Active Relays</label>
        <input type="number" id="relayCountInput" min="1" max="16" value="5">
      </div>
      <div id="labelEditor" style="margin-bottom:15px; border-top:1px solid var(--border); padding-top:15px;">
        <label style="font-size:0.85rem; color:#94a3b8; display:block; margin-bottom:10px;">Custom Labels</label>
        <div id="labelInputs"></div>
      </div>
      <button class="btn-primary" onclick="applySettings()">💾 Save & Apply Changes</button>
    </div>
  </div>

  <div class="card collapsible collapsed app-card hidden">
    <div class="card-header"><h3>⏰ Timer Scheduler</h3><span>▼</span></div>
    <div class="card-content">
      <div class="grid-2">
        <div class="form-group"><label>Relay</label><select id="schRelay"></select></div>
        <div class="form-group"><label>Action</label><select id="schAction"><option value="1">ON</option><option value="0">OFF</option></select></div>
      </div>
      <div class="form-group"><label>Time</label><input type="time" id="schTime"></div>
      <div class="form-group">
        <label>Active Days</label>
        <div class="day-grid" id="daySelector">
          <button class="day-btn" data-day="1">Mon</button><button class="day-btn" data-day="2">Tue</button>
          <button class="day-btn" data-day="3">Wed</button><button class="day-btn" data-day="4">Thu</button>
          <button class="day-btn" data-day="5">Fri</button><button class="day-btn" data-day="6">Sat</button>
          <button class="day-btn" data-day="0">Sun</button>
        </div>
      </div>
      <button class="btn-primary" onclick="addSchedule()">➕ Add Schedule</button>
      <div id="scheduleList" style="margin-top:20px;"></div>
    </div>
  </div>

  <div class="card app-card hidden">
    <h3 style="margin-bottom:10px; font-size:1rem;">📝 System Logs</h3>
    <div class="terminal" id="terminal"></div>
    <button class="btn-secondary" style="padding:5px;" onclick="$('terminal').innerHTML=''">Clear Logs</button>
  </div>
</div>

<div id="qrModal">
  <div class="modal-box">
    <h3 style="margin-bottom:15px;">📷 Scan QR Code</h3>
    <div id="reader"></div>
    <button class="btn-danger" style="margin-top:15px;" onclick="closeQR()">Cancel</button>
  </div>
</div>

<script>
  let mqttClient = null;
  let DEVICE_ID = "";
  let relayCount = 5;
  let relayLabels = {};
  let schedules = JSON.parse(localStorage.getItem('dm_schedules') || '[]');
  let lastTriggered = {};

  const $ = id => document.getElementById(id);
  const log = msg => { const t = $('terminal'); t.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}\n${t.innerHTML}`; };

  // --- Core Functions ---
  function initApp() {
    const saved = localStorage.getItem('dm_full_config');
    if(saved) {
      const cfg = JSON.parse(saved);
      DEVICE_ID = cfg.device;
      relayCount = parseInt(localStorage.getItem('dm_relay_count') || 5);
      relayLabels = JSON.parse(localStorage.getItem('dm_relay_labels') || '{}');
      connectMQTT(cfg);
      setUIState(true);
    }
    initAccordion();
    initDaySelector();
  }

  function setUIState(connected) {
    document.querySelectorAll('.app-card').forEach(c => c.classList.toggle('hidden', !connected));
    $('connCard').classList.toggle('hidden', connected);
    $('disconnectBtn').classList.toggle('hidden', !connected);
    if(connected) {
      renderRelayButtons();
      renderLabelEditor();
      renderSchedules();
      updateSchRelaySelect();
    }
  }

  function connectMQTT(cfg) {
    const url = `wss://${cfg.broker}:${cfg.port}/mqtt`;
    mqttClient = mqtt.connect(url, { username: cfg.user, password: cfg.pass, clientId: 'web_'+Math.random().toString(16).substr(2,5)});
    
    mqttClient.on('connect', () => {
      log("Connected to MQTT Broker");
      mqttClient.subscribe([`${DEVICE_ID}/status`, `${DEVICE_ID}/relay/+/state`]);
    });

    mqttClient.on('message', (topic, msg) => {
      const payload = msg.toString();
      if(topic.includes('/status')) updateStatus(payload);
      if(topic.includes('/relay/')) {
        const parts = topic.split('/');
        updateRelayUI(parts[2], payload);
      }
    });
  }

  function pub(topic, payload) { if(mqttClient) mqttClient.publish(topic, payload); }

  // --- Relay & Label UI ---
  function renderRelayButtons() {
    const container = $('relayBtns');
    container.innerHTML = '';
    for(let i=1; i<=relayCount; i++) {
      const name = relayLabels[i] || `Relay ${i}`;
      const btn = document.createElement('button');
      btn.id = `btn-${i}`;
      btn.className = 'btn-secondary';
      btn.innerHTML = `${name}<br><small>OFF</small>`;
      btn.onclick = () => {
        const isOff = btn.classList.contains('btn-secondary');
        pub(`${DEVICE_ID}/relay/${i}/cmd`, isOff ? '1' : '0');
        if(window.navigator.vibrate) window.navigator.vibrate(30);
      };
      container.appendChild(btn);
    }
  }

  function updateRelayUI(num, state) {
    const btn = $(`btn-${num}`);
    if(!btn) return;
    const isOn = state === '1';
    btn.className = isOn ? 'btn-success' : 'btn-secondary';
    const name = relayLabels[num] || `Relay ${num}`;
    btn.innerHTML = `${name}<br><small>${isOn ? 'ON' : 'OFF'}</small>`;
  }

  function renderLabelEditor() {
    const container = $('labelInputs');
    container.innerHTML = '';
    for(let i=1; i<=relayCount; i++) {
      const div = document.createElement('div');
      div.className = 'label-edit-item';
      div.innerHTML = `<span>Relay ${i}</span><input type="text" id="label-in-${i}" value="${relayLabels[i] || ''}" placeholder="e.g. Lampu Teras">`;
      container.appendChild(div);
    }
  }

  function applySettings() {
    const newCount = parseInt($('relayCountInput').value);
    const newLabels = {};
    for(let i=1; i<=newCount; i++) {
      const val = $(`label-in-${i}`) ? $(`label-in-${i}`).value.trim() : "";
      if(val) newLabels[i] = val;
    }
    
    relayCount = newCount;
    relayLabels = newLabels;
    localStorage.setItem('dm_relay_count', relayCount);
    localStorage.setItem('dm_relay_labels', JSON.stringify(relayLabels));
    
    renderRelayButtons();
    updateSchRelaySelect();
    alert("Settings saved!");
  }

  // --- Scheduler Logic ---
  function addSchedule() {
    const time = $('schTime').value;
    const days = Array.from(document.querySelectorAll('.day-btn.active')).map(b => parseInt(b.dataset.day));
    if(!time || days.length === 0) return alert("Pilih waktu dan hari!");

    const sch = {
      id: Date.now(),
      relay: $('schRelay').value,
      action: $('schAction').value,
      time: time,
      days: days,
      enabled: true
    };
    schedules.push(sch);
    saveSchedules();
  }

  function saveSchedules() {
    localStorage.setItem('dm_schedules', JSON.stringify(schedules));
    renderSchedules();
  }

  function renderSchedules() {
    const list = $('scheduleList');
    list.innerHTML = '';
    const dayNames = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
    schedules.forEach(s => {
      const item = document.createElement('div');
      item.className = 'schedule-item';
      const rName = relayLabels[s.relay] || `Relay ${s.relay}`;
      item.innerHTML = `
        <div>
          <b>${s.time} - ${rName} (${s.action=='1'?'ON':'OFF'})</b><br>
          <small>${s.days.map(d=>dayNames[d]).join(', ')}</small>
        </div>
        <div style="display:flex; gap:10px;">
          <div class="toggle-switch ${s.enabled?'active':''}" onclick="toggleSch(${s.id})"></div>
          <button style="width:auto; padding:5px 10px; background:var(--danger);" onclick="delSch(${s.id})">🗑️</button>
        </div>
      `;
      list.appendChild(item);
    });
  }

  function toggleSch(id) {
    const s = schedules.find(x => x.id === id);
    if(s) s.enabled = !s.enabled;
    saveSchedules();
  }

  function delSch(id) {
    schedules = schedules.filter(x => x.id !== id);
    saveSchedules();
  }

  function checkSchedules() {
    const now = new Date();
    const curTime = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    const curDay = now.getDay();

    schedules.forEach(s => {
      if(!s.enabled || s.time !== curTime || !s.days.includes(curDay)) return;
      const key = `${s.id}-${curTime}`;
      if(lastTriggered[key]) return;
      
      lastTriggered[key] = true;
      pub(`${DEVICE_ID}/relay/${s.relay}/cmd`, s.action);
      log(`[AUTO] ${relayLabels[s.relay]||'Relay '+s.relay} set to ${s.action=='1'?'ON':'OFF'}`);
    });
  }

  // --- UI Helpers ---
  function initAccordion() {
    document.querySelectorAll('.card-header').forEach(h => {
      h.onclick = () => {
        h.parentElement.classList.toggle('collapsed');
        h.querySelector('span').innerText = h.parentElement.classList.contains('collapsed') ? '▼' : '▲';
      };
    });
  }

  function initDaySelector() {
    document.querySelectorAll('.day-btn').forEach(b => {
      b.onclick = () => b.classList.toggle('active');
    });
  }

  function updateSchRelaySelect() {
    const sel = $('schRelay');
    sel.innerHTML = '';
    for(let i=1; i<=relayCount; i++) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.innerText = relayLabels[i] || `Relay ${i}`;
      sel.appendChild(opt);
    }
  }

  function updateStatus(raw) {
    try {
      const d = JSON.parse(raw);
      $('sigVal').innerText = d.rssi + '%';
      $('upVal').innerText = d.uptime;
      $('tempVal').innerText = d.temp + '°C';
      $('fwVal').innerText = d.fw_version;
    } catch(e) {}
  }

  // --- QR Scanner ---
  let html5QrCode = null;
  function openQR() {
    $('qrModal').style.display = 'flex';
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
      try {
        const cfg = JSON.parse(text);
        localStorage.setItem('dm_full_config', text);
        DEVICE_ID = cfg.device;
        connectMQTT(cfg);
        setUIState(true);
        closeQR();
      } catch(e) { alert("Format QR salah!"); }
    });
  }

  function closeQR() {
    if(html5QrCode) html5QrCode.stop();
    $('qrModal').style.display = 'none';
  }

  $('disconnectBtn').onclick = () => {
    if(confirm("Hapus konfigurasi dan disconnect?")) {
      localStorage.clear();
      location.reload();
    }
  };

  setInterval(checkSchedules, 30000);
  window.onload = initApp;
</script>

</body>
</html>
