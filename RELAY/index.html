<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'MarcFF Robotic - IoT Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #007bff;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-muted: #666;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --terminal-bg: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 5px solid var(--primary-color);
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            font-size: 1.2rem;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background: #fafafa;
        }

        input:focus, select:focus {
            border-color: var(--secondary-color);
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-update {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 12px rgba(0,86,179,0.2);
        }

        .btn-update:hover {
            background-color: #004494;
            transform: translateY(-1px);
        }

        .btn-clear {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            margin-top: 15px;
            font-size: 11px;
            padding: 8px;
        }

        .btn-clear:hover {
            background-color: rgba(220, 53, 69, 0.05);
        }

        #log {
            background: var(--terminal-bg);
            color: #4ade80;
            padding: 15px;
            border-radius: 10px;
            height: 140px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 11px;
            margin-top: 25px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #aaa;
        }

        .footer b {
            color: var(--primary-color);
        }

        /* Custom Scrollbar for Log */
        #log::-webkit-scrollbar { width: 5px; }
        #log::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>D'MarcFF Provisioning</h2>
    
    <div class="input-group">
        <label>ID Perangkat (6 Digit MAC)</label>
        <input type="text" id="deviceID" placeholder="Contoh: EBCF08" value="EBCF08" oninput="checkDevice()">
    </div>

    <div class="input-group">
        <label>Pesan String</label>
        <input type="text" id="valStr" placeholder="Status operasional...">
    </div>
    
    <div class="input-group">
        <label>Nilai Angka</label>
        <input type="number" id="valNum" value="0">
    </div>
    
    <div class="input-group">
        <label>Status Relay</label>
        <select id="valBool">
            <option value="true">AKTIF (ON)</option>
            <option value="false">MATI (OFF)</option>
        </select>
    </div>

    <button class="btn-update" onclick="handleUpdate()">SIMPAN KE GITHUB & MQTT</button>
    
    <div id="log">Sistem Siap...</div>
    
    <button class="btn-clear" onclick="clearToken()">HAPUS TOKEN AKSES</button>

    <div class="footer">
        Copyright © 2026 <b>D'marcFF Robotic</b>
    </div>
</div>

<script>
    const CONFIG = {
        repo: 'dreborn2k/dmarch_relay_001',
        basePath: 'RELAY', 
        mqttUrl: 'wss://ddac82518d464650bbfe8e03922a3ca8.s1.eu.hivemq.cloud:8884/mqtt',
        mqttUser: 'dmarchFF',
        mqttPass: 'dmarchFF2205'
    };

    let mqttClient;

    function initMQTT() {
        mqttClient = mqtt.connect(CONFIG.mqttUrl, { username: CONFIG.mqttUser, password: CONFIG.mqttPass });
        mqttClient.on('connect', () => printLog("Koneksi MQTT Berhasil."));
    }

    function printLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `<div>> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    function getFullID() {
        let val = document.getElementById('deviceID').value.trim().toUpperCase();
        return val.startsWith("RELAY_") ? val : "RELAY_" + val;
    }

    function getGitHubToken() {
        let token = localStorage.getItem('gh_token');
        if (!token) {
            token = prompt("GitHub Token diperlukan untuk sinkronisasi:");
            if (token) localStorage.setItem('gh_token', token);
        }
        return token;
    }

    function clearToken() {
        if(confirm("Hapus token dari browser?")) {
            localStorage.removeItem('gh_token');
            location.reload();
        }
    }

    async function checkDevice() {
        const id = getFullID();
        const token = localStorage.getItem('gh_token');
        if (!token || id.length < 10) return;

        const url = `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.basePath}/${id}/data.json`;
        try {
            const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            if (res.ok) {
                const data = await res.json();
                const content = JSON.parse(atob(data.content));
                document.getElementById('valStr').value = content.string_data;
                document.getElementById('valNum').value = content.number_data;
                document.getElementById('valBool').value = content.bool_data.toString();
                printLog(`Data ${id} sinkron.`);
            }
        } catch (e) {}
    }

    async function handleUpdate() {
        const token = getGitHubToken();
        if (!token) return;

        const deviceID = getFullID();
        const payload = {
            device_id: deviceID,
            string_data: document.getElementById('valStr').value,
            number_data: parseInt(document.getElementById('valNum').value),
            bool_data: document.getElementById('valBool').value === "true",
            last_update: new Date().toLocaleString()
        };

        mqttClient.publish(`${deviceID}/config`, JSON.stringify(payload), { retain: true });
        printLog(`MQTT Sent: ${deviceID}`);

        const url = `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.basePath}/${deviceID}/data.json`;
        try {
            printLog("Syncing GitHub...");
            const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            let sha = null;
            if (getRes.ok) {
                const fileInfo = await getRes.json();
                sha = fileInfo.sha;
            }

            const putRes = await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: `Update ${deviceID} via Dash`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2)))),
                    sha: sha
                })
            });

            if (putRes.ok) printLog("Sinkronisasi Selesai. ✅");
            else {
                const err = await putRes.json();
                printLog("Error: " + err.message);
            }
        } catch (e) { printLog("Koneksi Putus."); }
    }

    initMQTT();
</script>
</body>
</html>
