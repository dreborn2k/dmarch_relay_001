<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'MarcFF Robotic - IoT Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        #log { background: #222; color: #0f0; padding: 15px; border-radius: 5px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-top: 20px; }
        .token-info { font-size: 11px; color: #666; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center">IoT Provisioning Dashboard</h2>
    
    <label>ID Perangkat (6 Digit MAC):</label>
    <input type="text" id="deviceID" placeholder="Contoh: EBCF08" onchange="checkDevice()">

    <hr>
    
    <label>Pesan String:</label>
    <input type="text" id="valStr" placeholder="Masukkan pesan...">
    
    <label>Nilai Angka:</label>
    <input type="number" id="valNum" value="0">
    
    <label>Status Relay:</label>
    <select id="valBool">
        <option value="true">ON (Aktif)</option>
        <option value="false">OFF (Mati)</option>
    </select>

    <button onclick="handleUpdate()">UPDATE & SYNC GITHUB</button>
    <button onclick="clearToken()" style="background: #dc3545; font-size: 11px;">Hapus Token dari Browser</button>
    
    <div id="log">Dashboard Ready.</div>
    <p class="token-info">Token disimpan aman di LocalStorage browser Anda.</p>
</div>

<script>
    // --- KONFIGURASI REPOSITORY ---
    const CONFIG = {
        repo: 'dreborn2k/dmarch_relay_001',
        basePath: 'Relay4Ch',
        // Kredensial MQTT HiveMQ Cloud
        mqttUrl: 'wss://ddac82518d464650bbfe8e03922a3ca8.s1.eu.hivemq.cloud:8884/mqtt',
        mqttUser: 'dmarchFF',
        mqttPass: 'dmarchFF2205'
    };

    let mqttClient;

    // --- INISIALISASI MQTT ---
    function initMQTT() {
        mqttClient = mqtt.connect(CONFIG.mqttUrl, {
            username: CONFIG.mqttUser,
            password: CONFIG.mqttPass
        });

        mqttClient.on('connect', () => printLog("MQTT Connected to HiveMQ Cloud."));
        mqttClient.on('error', (err) => printLog("MQTT Error: " + err));
    }

    function printLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `<br>> ${msg}`;
        log.scrollTop = log.scrollHeight;
    }

    function getFullID() {
        const id = document.getElementById('deviceID').value.toUpperCase();
        return id.startsWith("RELAY_") ? id : "RELAY_" + id;
    }

    // --- FUNGSI TOKEN (MEMINTA SAAT DIBUTUHKAN) ---
    function getGitHubToken() {
        let token = localStorage.getItem('gh_token');
        if (!token || token === "null") {
            token = prompt("GitHub Token diperlukan untuk sinkronisasi.\nSilakan masukkan Personal Access Token (Classic) Anda:");
            if (token) {
                localStorage.setItem('gh_token', token);
            }
        }
        return token;
    }

    function clearToken() {
        localStorage.removeItem('gh_token');
        alert("Token telah dihapus dari browser.");
        location.reload();
    }

    async function handleUpdate() {
        const token = getGitHubToken();
        if (!token) return alert("Proses dibatalkan. Token GitHub wajib diisi.");

        const deviceID = getFullID();
        const vStr = document.getElementById('valStr').value;
        const vNum = parseInt(document.getElementById('valNum').value);
        const vBool = document.getElementById('valBool').value === "true";

        const payload = {
            device_id: deviceID,
            string_data: vStr,
            number_data: vNum,
            bool_data: vBool,
            last_update: new Date().toLocaleString()
        };

        // 1. Kirim via MQTT Real-time
        mqttClient.publish(`${deviceID}/config`, JSON.stringify(payload), { retain: true });
        printLog(`MQTT Sent to ${deviceID}/config`);

        // 2. Sinkronisasi ke GitHub API
        const url = `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.basePath}/${deviceID}/data.json`;
        
        try {
            printLog("Menghubungi GitHub API...");
            
            // Cek SHA file (jika sudah ada)
            const getRes = await fetch(url, {
                headers: { 'Authorization': `token ${token}` }
            });

            let sha = null;
            if (getRes.status === 200) {
                const existingFile = await getRes.json();
                sha = existingFile.sha;
            }

            // Push ke GitHub
            const putRes = await fetch(url, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: `Auto-Provisioning: Update ${deviceID}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2)))),
                    sha: sha
                })
            });

            if (putRes.ok) {
                printLog("BERHASIL! Data tersimpan di GitHub SSoT. ✅");
            } else if (putRes.status === 401) {
                printLog("ERROR: Token tidak valid (401).");
                localStorage.removeItem('gh_token'); // Hapus token rusak
            } else {
                const errData = await putRes.json();
                printLog("Gagal: " + errData.message);
            }

        } catch (e) {
            printLog("Koneksi Error: " + e.message);
        }
    }

    // Jalankan MQTT saat startup
    initMQTT();
</script>

</body>
</html>
