<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'MarcFF Robotic | IoT System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --dark-bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --neon-glow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Rajdhani', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 25px;
            background: linear-gradient(to right, var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .input-group { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--primary);
            margin-bottom: 6px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 700;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: var(--neon-glow);
            outline: none;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: var(--neon-glow);
        }

        .btn-main:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        #log {
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 15px;
            height: 120px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.7rem;
            color: #a5f3fc;
            border-left: 2px solid var(--primary);
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
        }

        .footer span { color: var(--primary); font-weight: bold; }

        .btn-ghost {
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            text-decoration: underline;
        }

        /* Scrollbar Style */
        #log::-webkit-scrollbar { width: 4px; }
        #log::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>D'MARCFF ROBOTIC</h2>
    
    <div class="input-group">
        <label>System ID (MAC)</label>
        <input type="text" id="deviceID" placeholder="EBCF08" value="EBCF08" oninput="checkDevice()">
    </div>

    <div class="input-group">
        <label>Command String</label>
        <input type="text" id="valStr" placeholder="Ready...">
    </div>
    
    <div class="input-group" style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Value</label>
            <input type="number" id="valNum" value="0">
        </div>
        <div style="flex: 1;">
            <label>Relay Mode</label>
            <select id="valBool">
                <option value="true">ACTIVE</option>
                <option value="false">OFF</option>
            </select>
        </div>
    </div>

    <button class="btn-main" onclick="handleUpdate()">Deploy Configuration</button>
    
    <div id="log">SYSTEM INITIALIZED...</div>
    
    <button class="btn-ghost" onclick="clearToken()">Reset API Token</button>

    <div class="footer">
        © 2026 <span>D'MARCFF ROBOTIC</span>
    </div>
</div>

<script>
    const CONFIG = {
        repo: 'dreborn2k/dmarchFF',
        basePath: 'RELAY', 
        mqttUrl: 'wss://ddac82518d464650bbfe8e03922a3ca8.s1.eu.hivemq.cloud:8884/mqtt',
        mqttUser: 'dmarchFF',
        mqttPass: 'dmarchFF2205'
    };

    let mqttClient;

    function initMQTT() {
        mqttClient = mqtt.connect(CONFIG.mqttUrl, { username: CONFIG.mqttUser, password: CONFIG.mqttPass });
        mqttClient.on('connect', () => printLog("CONNECTION: MQTT ESTABLISHED"));
    }

    function printLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `<div>> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    function getFullID() {
        let val = document.getElementById('deviceID').value.trim().toUpperCase();
        return val.startsWith("RELAY_") ? val : "RELAY_" + val;
    }

    async function checkDevice() {
        const id = getFullID();
        const token = localStorage.getItem('gh_token');
        if (!token || id.length < 10) return;

        const url = `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.basePath}/${id}/data.json`;
        try {
            const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            if (res.ok) {
                const data = await res.json();
                const content = JSON.parse(atob(data.content));
                document.getElementById('valStr').value = content.string_data;
                document.getElementById('valNum').value = content.number_data;
                document.getElementById('valBool').value = content.bool_data.toString();
                printLog(`SYNC: ${id} DETECTED`);
            }
        } catch (e) {}
    }

    function clearToken() {
        if(confirm("Hapus token?")) {
            localStorage.removeItem('gh_token');
            location.reload();
        }
    }

    async function handleUpdate() {
        let token = localStorage.getItem('gh_token');
        if(!token) {
            token = prompt("Enter GitHub Token:");
            if(token) localStorage.setItem('gh_token', token);
            else return;
        }

        const deviceID = getFullID();
        const payload = {
            device_id: deviceID,
            string_data: document.getElementById('valStr').value,
            number_data: parseInt(document.getElementById('valNum').value),
            bool_data: document.getElementById('valBool').value === "true",
            last_update: new Date().toLocaleString()
        };

        mqttClient.publish(`${deviceID}/config`, JSON.stringify(payload), { retain: true });
        printLog(`MQTT: DISPATCHED TO ${deviceID}`);

        const url = `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.basePath}/${deviceID}/data.json`;
        try {
            printLog("GITHUB: STARTING SYNC...");
            const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            let sha = null;
            if (getRes.ok) {
                const fileInfo = await getRes.json();
                sha = fileInfo.sha;
            }

            const putRes = await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: `Automated Sync: ${deviceID}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2)))),
                    sha: sha
                })
            });

            if (putRes.ok) printLog("SUCCESS: GITHUB SSOT UPDATED ✅");
            else printLog("ERROR: SYNC FAILED");
        } catch (e) { printLog("CRITICAL: API ERROR"); }
    }

    initMQTT();
</script>
</body>
</html>
