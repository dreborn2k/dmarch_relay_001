<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'MarcFF Robotic - IoT Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; padding: 20px; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { text-align: center; color: #007bff; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { font-weight: bold; font-size: 14px; display: block; margin-top: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #007bff; outline: none; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 15px; }
        button:hover { background: #0056b3; }
        .btn-clear { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; font-size: 12px; margin-top: 5px; }
        #log { background: #1e1e1e; color: #4ade80; padding: 15px; border-radius: 8px; height: 160px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 12px; margin-top: 20px; line-height: 1.5; }
        .footer-text { font-size: 11px; color: #888; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>IoT Provisioning</h2>
    
    <label>ID Perangkat (6 Digit MAC):</label>
    <input type="text" id="deviceID" placeholder="Contoh: EBCF08" value="EBCF08" oninput="checkDevice()">

    <label>Pesan String (string_data):</label>
    <input type="text" id="valStr" placeholder="Masukkan pesan status...">
    
    <label>Nilai Angka (number_data):</label>
    <input type="number" id="valNum" value="0">
    
    <label>Status Relay (bool_data):</label>
    <select id="valBool">
        <option value="true">ON (Aktif)</option>
        <option value="false">OFF (Mati)</option>
    </select>

    <button onclick="handleUpdate()">UPDATE & SYNC GITHUB</button>
    <button class="btn-clear" onclick="clearToken()">Hapus Token dari Browser</button>
    
    <div id="log">Dashboard Ready.</div>
    <p class="footer-text">Copyright © 2026 D'marcFF Robotic<br>Data disimpan secara lokal di browser Anda.</p>
</div>

<script>
    const CONFIG = {
        repo: 'dreborn2k/dmarch_relay_001',
        basePath: 'Relay4Ch',
        mqttUrl: 'wss://ddac82518d464650bbfe8e03922a3ca8.s1.eu.hivemq.cloud:8884/mqtt',
        mqttUser: 'dmarchFF',
        mqttPass: 'dmarchFF2205'
    };

    let mqttClient;

    // Inisialisasi MQTT
    function initMQTT() {
        mqttClient = mqtt.connect(CONFIG.mqttUrl, { username: CONFIG.mqttUser, password: CONFIG.mqttPass });
        mqttClient.on('connect', () => printLog("MQTT Connected."));
        mqttClient.on('error', (err) => printLog("MQTT Error: " + err));
    }

    function printLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `<div>> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    function getFullID() {
        let id = document.getElementById('deviceID').value.trim().toUpperCase();
        if (!id) return "";
        return id.startsWith("RELAY_") ? id : "RELAY_" + id;
    }

    function getGitHubToken() {
        let token = localStorage.getItem('gh_token');
        if (!token || token === "null") {
            token = prompt("Masukkan GitHub Personal Access Token (Classic):");
            if (token) localStorage.setItem('gh_token', token);
        }
        return token;
    }

    function clearToken() {
        localStorage.removeItem('gh_token');
        alert("Token dihapus.");
        location.reload();
    }

    // FUNGSI CEK STATUS (Mendeteksi apakah folder/file sudah ada)
    async function checkDevice() {
        const id = getFullID();
        if (id.length < 12) return; // Tunggu sampai ID lengkap (RELAY_ + 6 digit)
        
        const token = localStorage.getItem('gh_token');
        if (!token) return;

        const url = `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.basePath}/${id}/data.json`;
        
        try {
            const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            if (res.ok) {
                const data = await res.json();
                const content = JSON.parse(atob(data.content));
                printLog(`Device ${id} terdeteksi di Repo.`);
                // Isi form otomatis dengan data terakhir
                document.getElementById('valStr').value = content.string_data;
                document.getElementById('valNum').value = content.number_data;
                document.getElementById('valBool').value = content.bool_data.toString();
            }
        } catch (e) { console.error(e); }
    }

    async function handleUpdate() {
        const token = getGitHubToken();
        if (!token) return;

        const deviceID = getFullID();
        if (!deviceID || deviceID.length < 8) return alert("ID Device tidak valid!");

        const payload = {
            device_id: deviceID,
            string_data: document.getElementById('valStr').value,
            number_data: parseInt(document.getElementById('valNum').value),
            bool_data: document.getElementById('valBool').value === "true",
            last_update: new Date().toLocaleString()
        };

        // 1. MQTT Publish
        mqttClient.publish(`${deviceID}/config`, JSON.stringify(payload), { retain: true });
        printLog(`Sent MQTT: ${deviceID}`);

        // 2. GitHub Sync
        const url = `https://api.github.com/repos/${CONFIG.repo}/contents/${CONFIG.basePath}/${deviceID}/data.json`;
        
        try {
            printLog("Menyinkronkan ke GitHub...");
            const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            
            let sha = null;
            if (getRes.status === 200) {
                const existingFile = await getRes.json();
                sha = existingFile.sha;
            }

            const putRes = await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: `Update ${deviceID}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2)))),
                    sha: sha
                })
            });

            if (putRes.ok) {
                printLog("BERHASIL! Cek folder GitHub Anda sekarang. ✅");
            } else {
                const err = await putRes.json();
                printLog("Error: " + err.message);
            }
        } catch (e) {
            printLog("Gagal: " + e.message);
        }
    }

    initMQTT();
</script>

</body>
</html>
